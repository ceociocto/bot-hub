name: OpenCode Issue Resolver (PR Mode)

# 添加并发控制逻辑
concurrency:
  # 使用 issue 编号作为分组 ID。
  # 这样同一个 Issue 的多次触发会排队，而不同 Issue 可以并行或有序进行。
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true # 如果同一个 Issue 有新指令，取消正在进行的旧任务

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  opencode_fix:
    if: |
      github.event.sender.login == github.repository_owner && 
      (
        (github.event.label.name == 'opencode') || 
        (github.event.comment && contains(github.event.comment.body, '/oc'))
      )
    
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write      # OIDC 令牌权限
      contents: write      # 修改代码权限
      issues: write        # 回复 Issue 权限
      pull-requests: write # 创建 PR 权限

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: OpenCode Zen Execution
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: "opencode/minimax-m2.5-free"
          mode: "fix"
          auto_commit: false
          create_pr: true
          branch_prefix: "oc-fix/"